<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>專業序列計時器 - 雲端同步版</title>
    <style>
        :root {
            --bg: #000000;
            --card: #1C1C1E;
            --running: #34C759;
            --finished: #FF3B30;
            --blue: #0A84FF;
            --key-bg: #2C2C2E;
            --text: #FFFFFF;
            --subtext: #8E8E93;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); color: var(--text); margin: 0; padding: 10px; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        
        .sync-status { font-size: 0.75rem; color: #8E8E93; margin-bottom: 10px; padding: 4px 12px; border-radius: 10px; background: #1c1c1e; }
        .sync-online { color: #34C759; }

        .grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; 
            width: 100%; max-width: 1200px; flex-grow: 1;
        }

        .timer-card { 
            background: var(--card); padding: 15px; border-radius: 20px; 
            transition: background 0.4s ease; position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); height: fit-content;
        }
        
        .timer-card.running { background: var(--running); color: #000; }
        .timer-card.finished { background: var(--finished); color: #fff; }

        .display-area { text-align: center; margin-bottom: 12px; }
        .display { font-size: 2.2rem; font-weight: 300; font-variant-numeric: tabular-nums; color: var(--blue); letter-spacing: -1px; margin-bottom: 4px; }
        .running .display { color: #000; font-weight: 600; }
        .finished .display { color: #fff; }

        .eta-display { font-size: 0.85rem; color: var(--subtext); font-weight: 500; }
        .running .eta-display { color: rgba(0,0,0,0.7); }
        .finished .eta-display { color: rgba(255,255,255,0.9); }

        .calc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin: 0 auto; }
        .key { 
            background: var(--key-bg); color: white; border: none; border-radius: 10px; 
            padding: 12px 0; font-size: 1.2rem; font-weight: 600; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .key:active { background: #636366; transform: scale(0.92); }
        .key.clear { background: #FF9F0A; color: black; }
        .running .key { opacity: 0.1; pointer-events: none; }

        .controls { display: flex; gap: 8px; margin-top: 15px; }
        .btn-main { flex: 1; padding: 15px 5px; border-radius: 12px; border: none; font-weight: 700; font-size: 1rem; cursor: pointer; }
        .start { background: var(--blue); color: white; }
        .pause { background: #fff; color: #000; }
        .reset { background: #48484A; color: white; }

        .footer { margin-top: 30px; padding-bottom: 20px; width: 100%; display: flex; justify-content: center; }
        .notif-btn { background: #2C2C2E; color: #8E8E93; border: 1px solid #48484A; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="syncStatus" class="sync-status">📡 正在連接 Firebase...</div>
    <div class="grid" id="mainGrid"></div>

    <div class="footer">
        <button class="notif-btn" id="askNotif" onclick="requestNotif()">🔔 點擊開啟通知</button>
    </div>

<script type="module">
    // --- Firebase SDK 核心 ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBjE2Lmb1SCd2ed4eL68ctZQslPC58xACo",
        authDomain: "time-e0873.firebaseapp.com",
        databaseURL: "https://time-e0873-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "time-e0873",
        storageBucket: "time-e0873.firebasestorage.app",
        messagingSenderId: "720761940648",
        appId: "1:720761940648:web:625e4e6f1978a89d98309d"
    };

    // 初始化 Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const timersRef = ref(db, 'timers/');

    window.timers = {};

    // 1. 本地先行初始化 (避免連線中畫面空白)
    for(let i=1; i<=4; i++) {
        window.timers[i] = { d:0, h:0, m:0, rawInput:"", endTime:null, isPaused:false, pauseRemain:0, isFinished:false, frozenEndTime:null };
        createTimer(i);
        updateUI(i);
    }

    // 2. 監聽雲端資料 (當電腦按開始，手機會自動跳動)
    onValue(timersRef, (snapshot) => {
        const data = snapshot.val();
        const statusEl = document.getElementById('syncStatus');
        statusEl.innerText = "☁️ 雲端同步中";
        statusEl.classList.add('sync-online');

        if (data) {
            for (let i = 1; i <= 4; i++) {
                if (data[i]) {
                    window.timers[i] = data[i];
                    updateUI(i);
                }
            }
        }
    });

    // 3. 儲存函式
    window.saveToCloud = function(i) {
        set(ref(db, 'timers/' + i), window.timers[i]);
    };

    // 4. 設定 60 秒更新一次 UI
    setInterval(() => { 
        for(let i=1; i<=4; i++) updateUI(i); 
    }, 60000);

</script>

<script>
    // --- 介面功能邏輯 ---

    function createTimer(idx) {
        if (document.getElementById(`card${idx}`)) return;
        const div = document.createElement('div');
        div.className = 'timer-card';
        div.id = `card${idx}`;
        div.innerHTML = `
            <div style="display:flex; justify-content:space-between; margin-bottom:5px; opacity:0.5; font-size:0.7rem;">
                <span># ${idx}</span>
                <span id="stat${idx}">READY</span>
            </div>
            <div class="display-area">
                <div class="display" id="disp${idx}">00d 00h 00m</div>
                <div class="eta-display" id="eta${idx}">結束預計 --/-- --:--</div>
            </div>
            <div class="calc-grid">
                ${[1,2,3,4,5,6,7,8,9].map(n => `<button class="key" onclick="pressNum(${idx}, ${n})">${n}</button>`).join('')}
                <button class="key clear" onclick="clearInput(${idx})">C</button>
                <button class="key" onclick="pressNum(${idx}, 0)">0</button>
                <div style="visibility:hidden"></div>
            </div>
            <div class="controls">
                <button class="btn-main start" id="btnS${idx}" onclick="toggle(${idx})">開始</button>
                <button class="btn-main reset" onclick="reset(${idx})">重設</button>
            </div>
        `;
        document.getElementById('mainGrid').appendChild(div);
    }

    function formatFullDateTime(timestamp) {
        if (!timestamp) return "--/-- --:--";
        const date = new Date(timestamp);
        const month = (date.getMonth() + 1).toString().padStart(2, '0');
        const day = date.getDate().toString().padStart(2, '0');
        const hours = date.getHours().toString().padStart(2, '0');
        const mins = date.getMinutes().toString().padStart(2, '0');
        return `${month}/${day} ${hours}:${mins}`;
    }

    function updateUI(i) {
        const t = window.timers[i];
        if (!t) return;
        const card = document.getElementById(`card${i}`);
        const disp = document.getElementById(`disp${i}`);
        const etaDisp = document.getElementById(`eta${i}`);
        const btn = document.getElementById(`btnS${i}`);
        const stat = document.getElementById(`stat${i}`);

        let displayMins = 0;
        let now = Date.now();

        if (t.endTime && !t.isPaused) {
            displayMins = Math.ceil((t.endTime - now) / 60000);
            if (displayMins <= 0) {
                displayMins = 0; 
                if (!t.isFinished) {
                    sendNotification(i);
                    t.frozenEndTime = t.endTime;
                    t.endTime = null; 
                    t.isFinished = true;
                    if (window.saveToCloud) window.saveToCloud(i);
                }
            }
        } else if (t.isPaused) {
            displayMins = t.pauseRemain;
        } else if (t.isFinished) {
            displayMins = 0;
        } else {
            displayMins = (t.d * 1440 + t.h * 60 + t.m);
        }

        // 外觀渲染
        if (t.isFinished) {
            card.className = "timer-card finished";
            btn.innerText = "完成";
            stat.innerText = "TIME UP";
            etaDisp.innerText = "已於 " + formatFullDateTime(t.frozenEndTime) + " 結束";
        } else if (t.endTime && !t.isPaused) {
            card.className = "timer-card running";
            btn.innerText = "暫停";
            btn.className = "btn-main pause";
            stat.innerText = "RUNNING";
            etaDisp.innerText = "預計結束 " + formatFullDateTime(t.endTime);
        } else {
            card.className = "timer-card";
            btn.innerText = t.isPaused ? "繼續" : "開始";
            btn.className = "btn-main start";
            stat.innerText = t.isPaused ? "PAUSED" : "READY";
            let previewEnd = now + (displayMins * 60000);
            etaDisp.innerText = displayMins > 0 ? "預計結束 " + formatFullDateTime(previewEnd) : "結束預計 --/-- --:--";
        }

        const d = Math.floor(displayMins / 1440);
        const h = Math.floor((displayMins % 1440) / 60);
        const m = displayMins % 60;
        disp.innerText = `${d.toString().padStart(2,'0')}d ${h.toString().padStart(2,'0')}h ${m.toString().padStart(2,'0')}m`;
        
        refreshPageTitle();
    }

    function refreshPageTitle() {
        let active = Object.values(window.timers).filter(t => t.endTime && !t.isPaused);
        let done = Object.values(window.timers).filter(t => t.isFinished);
        if (done.length > 0) document.title = "【DONE】";
        else if (active.length > 0) {
            let m = Math.ceil((active[0].endTime - Date.now()) / 60000);
            document.title = `(${m}m)`;
        } else document.title = "計時器";
    }

    function requestNotif() {
        Notification.requestPermission().then(p => {
            if (p === "granted") {
                document.getElementById('askNotif').innerText = "✅ 通知已開啟";
                setTimeout(() => document.getElementById('askNotif').style.opacity = '0.3', 1500);
            }
        });
    }

    function sendNotification(idx) {
        if (Notification.permission === "granted") {
            new Notification(`計時器 ${idx} 結束`, { body: `準確結束時間：${formatFullDateTime(Date.now())}` });
        }
    }

    // --- 按鈕操作 ---

    window.pressNum = (i, num) => {
        const t = timers[i];
        if (t.endTime && !t.isPaused) return;
        t.isFinished = false;
        t.frozenEndTime = null;
        t.rawInput = (t.rawInput + num).slice(-6); 
        const val = t.rawInput.padStart(6, '0');
        t.d = parseInt(val.substring(0, 2));
        t.h = parseInt(val.substring(2, 4));
        t.m = parseInt(val.substring(4, 6));
        updateUI(i);
        if (window.saveToCloud) window.saveToCloud(i);
    };

    window.clearInput = (i) => {
        const t = timers[i];
        if (t.endTime && !t.isPaused) return;
        Object.assign(t, { d:0, h:0, m:0, rawInput:"", endTime:null, isPaused:false, pauseRemain:0, isFinished:false, frozenEndTime:null });
        updateUI(i);
        if (window.saveToCloud) window.saveToCloud(i);
    };

    window.toggle = (i) => {
        const t = timers[i];
        if (t.endTime && !t.isPaused) {
            t.isPaused = true;
            t.pauseRemain = Math.ceil((t.endTime - Date.now()) / 60000);
            t.endTime = null;
        } else {
            let totalM = t.isPaused ? t.pauseRemain : (t.d * 1440 + t.h * 60 + t.m);
            if (totalM <= 0) return;
            t.isPaused = false;
            t.isFinished = false;
            t.frozenEndTime = null;
            t.endTime = Date.now() + (totalM * 60000);
        }
        updateUI(i);
        if (window.saveToCloud) window.saveToCloud(i);
    };

    window.reset = (i) => {
        window.timers[i] = { d:0, h:0, m:0, rawInput:"", endTime:null, isPaused:false, pauseRemain:0, isFinished:false, frozenEndTime:null };
        updateUI(i);
        if (window.saveToCloud) window.saveToCloud(i);
    };
</script>
</body>
</html>
